<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD CINTA - Excellent Girl</title>
    <!-- Font khusus yang elegan dan playful -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            /* Background Gradient Pastel */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #a6c1ee 100%);
            position: relative;
        }

        /* Overlay untuk memicu musik di Android */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 154, 158, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 25px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: none; /* Muncul setelah klik overlay */
        }

        h1 {
            font-size: 2.5rem;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            margin-bottom: 5px;
        }

        .name {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            color: #ff007f;
            display: block;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px rgba(255, 0, 127, 0.3));
        }

        .cake {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .message-box {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 20px;
            color: #444;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            animation: fadeIn 1s;
        }

        .excellent {
            display: block;
            margin-top: 10px;
            font-weight: 900;
            color: #ff007f;
            font-size: 1.3rem;
        }

        .btn {
            background: #ff007f;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
            transition: 0.3s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div style="font-size: 60px; margin-bottom: 20px;">🎁</div>
        <h2 style="margin-bottom: 20px;">Ada kado buat CINTA...</h2>
        <button class="btn" onclick="startApp()">Buka Kado</button>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <div class="container" id="card">
        <h1>Happy Birthday</h1>
        <span class="name">CINTA</span>
        <div class="cake">🎂</div>
        
        <div id="msg" class="message-box">
            Happy birthday ya cin, semoga sehat selalu, panjang umur, bahagia selalu...
            <span class="excellent">U're excellent girl! ✨</span>
        </div>

        <button id="wish-btn" class="btn" onclick="showMsg()">Klik untuk Ucapan</button>
    </div>

    <!-- Musik Happy Birthday -->
    <audio id="music" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-happy-birthday-to-you-154.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('music');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('card').style.display = 'block';
            music.play();
            createConfetti();
            animate();
        }

        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 6.28
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speed;
                if (p.y > canvas.height) p.y = -10;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(animate);
        }

        function showMsg() {
            document.getElementById('msg').style.display = 'block';
            document.getElementById('wish-btn').style.display = 'none';
            // Tambah konfeti banyak saat diklik
            for(let i=0; i<50; i++) {
                particles.push({
                    x: canvas.width/2,
                    y: canvas.height/2,
                    size: Math.random() * 10 + 5,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    speed: Math.random() * 10 + 2,
                    angle: Math.random() * 6.28
                });
            }
        }
    </script>
</body>
</html>
